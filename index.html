<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Observatory — Kanaputz Research Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&family=VT323&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=31">
  <link rel="preload" href="assets/cork-bg.png" as="image">
  <link rel="preload" href="assets/terminal-bg.png" as="image">
  <link rel="preload" href="assets/terminal2-bg.png" as="image">
</head>
<body>

  <!-- ROOM SCENE -->
  <div id="room" class="room">
    <!-- Scene container: scales with the image so hotspots stay aligned -->
    <div class="room-scene">
      <img src="assets/room-bg.jpg" alt="Observatory desk" class="room-bg">

      <!-- Clickable hotspot zones (positioned relative to the image) -->

      <!-- Left CRT monitor → DOS sighting terminal -->
      <div class="hotspot zone" data-target="terminal-detail" id="zone-terminal"></div>

      <!-- Right CRT monitor → Profile database -->
      <div class="hotspot zone" data-target="profiles-detail" id="zone-profiles"></div>

      <!-- Cork pin board on the wall -->
      <div class="hotspot zone" data-target="pinboard-detail" id="zone-pinboard"></div>

      <!-- Notepad (bottom right) -->
      <div class="hotspot zone" data-target="notepad-detail" id="zone-notepad"></div>

      <!-- Cassette player (right of desk) -->
      <div class="hotspot zone" data-target="cassette-detail" id="zone-cassette"></div>

      <!-- Safe (lower desk area) — visible from Wave 2 -->
      <div class="hotspot zone" data-target="safe-detail" id="zone-safe"></div>

      <!-- Source Monitor C (empty stand) — visible from Wave 4 -->
      <div class="hotspot zone" data-target="source-detail" id="zone-source"></div>
    </div>

    <!-- Ambient light overlay -->
    <div class="room-light"></div>

  </div>

  <!-- Landscape prompt — shown on portrait mobile -->
  <div class="landscape-prompt" id="landscape-prompt">
    <svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="15" y="8" width="30" height="44" rx="4"/>
      <circle cx="30" cy="46" r="2"/>
    </svg>
    <p>Please rotate your device to landscape mode for the best experience</p>
  </div>

  <!-- ===== DETAIL OVERLAYS ===== -->
  <div id="detail-overlay" class="detail-overlay hidden">
    <button class="detail-close" id="detail-close">&times;</button>

    <!-- Terminal Detail — CRT Monitor -->
    <div class="detail-content" id="terminal-detail">
      <div class="crt-monitor crt-green">
        <div class="crt-bezel">
          <div class="crt-screen-well">
            <div class="crt-screen">
              <div class="crt-scanlines"></div>
              <div class="crt-curvature"></div>
              <div class="terminal-header">
                <span>&nbsp;&nbsp;KANAPUTZ OBSERVATORY — LIVE SIGHTING FEED</span>
                <span class="terminal-status">SIGNAL: ACTIVE</span>
              </div>
              <div class="terminal-body" id="terminal-feed"></div>
            </div>
          </div>
          <div class="crt-controls">
            <div class="crt-led crt-led-on"></div>
            <div class="crt-brand">KANAPUTZ OBS. NETWORK</div>
            <div class="crt-knobs">
              <div class="crt-knob"></div>
              <div class="crt-knob"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sightings Map — CRT Monitor with world map -->
    <div class="detail-content" id="profiles-detail">
      <div class="map-monitor">
        <div class="map-screen" id="map-screen">
          <!-- Dots generated dynamically from MAP_SIGHTINGS by app.js -->
        </div>
        <!-- Info panel shown when clicking a dot -->
        <div class="map-info" id="map-info"></div>
      </div>
    </div>

    <!-- Pin Board Detail -->
    <div class="detail-content" id="pinboard-detail">
      <div class="pinboard-full">
        <div class="pinboard-header">ACTIVE INVESTIGATION BOARD</div>
        <div class="pinboard-surface" id="pinboard-surface"></div>
      </div>
    </div>

    <!-- Notepad Detail — Notebook with AI background -->
    <div class="detail-content" id="notepad-detail">
      <div class="notebook-outer">
        <div class="notebook-content">
          <div class="notebook-spread" id="journal-book"></div>
        </div>
        <div class="notebook-nav">
          <button class="notebook-nav-btn" id="journal-prev">◂ Prev</button>
          <span class="notebook-nav-count" id="journal-count"></span>
          <button class="notebook-nav-btn" id="journal-next">Next ▸</button>
        </div>
      </div>
    </div>

    <!-- Cassette Player Detail -->
    <div class="detail-content" id="cassette-detail">
      <div class="cassette-player">
        <div class="cassette-deck">
          <div class="cassette-window">
            <div class="cassette-reel left-reel"></div>
            <div class="cassette-reel right-reel"></div>
            <div class="cassette-tape-label" id="cassette-label">NO TAPE LOADED</div>
          </div>
          <div class="cassette-waveform" id="cassette-waveform"></div>
        </div>
        <div class="cassette-controls">
          <button class="cassette-btn" id="cassette-play" title="Play">▶</button>
          <button class="cassette-btn" id="cassette-stop" title="Stop">■</button>
          <button class="cassette-btn" id="cassette-rewind" title="Rewind">◀◀</button>
        </div>
        <div class="cassette-tape-list" id="cassette-tape-list"></div>
        <div class="cassette-description" id="cassette-description"></div>
      </div>
    </div>

    <!-- Safe Detail -->
    <div class="detail-content" id="safe-detail">
      <div class="safe-container" id="safe-container">
        <div class="safe-door" id="safe-door">
          <div class="safe-dial-area" id="safe-dial-area">
            <div class="safe-dial" id="safe-dial">
              <div class="safe-dial-marker"></div>
            </div>
            <div class="safe-display" id="safe-display">LOCKED</div>
          </div>
          <div class="safe-handle" id="safe-handle"></div>
        </div>
        <!-- Dossier content (shown after safe opens) -->
        <div class="safe-dossier hidden" id="safe-dossier"></div>
      </div>
    </div>

    <!-- Source Monitor C Detail -->
    <div class="detail-content" id="source-detail">
      <div class="source-monitor">
        <div class="source-screen" id="source-screen">
          <div class="source-header">SOURCE MONITORING SYSTEM</div>
          <div class="source-coherence" id="source-coherence"></div>
          <div class="source-feed" id="source-feed"></div>
          <div class="source-readings" id="source-readings"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/waves.js?v=31"></script>
  <script src="js/data.js?v=31"></script>
  <script src="js/terminal.js?v=31"></script>
  <script src="js/app.js?v=31"></script>
</body>
</html>
